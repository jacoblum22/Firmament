name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Backend Tests
    runs-on: ubuntu-latest

    env:
      # Minimal dev-mode env vars so Settings() loads without validation errors.
      # No real secrets needed — these tests don't make live API calls.
      ENVIRONMENT: development
      JWT_SECRET: ci-test-jwt-secret-minimum-32-characters-long
      GOOGLE_CLIENT_ID: ci-test-client-id.apps.googleusercontent.com
      AWS_ACCESS_KEY_ID: ci-test-access-key
      AWS_SECRET_ACCESS_KEY: ci-test-secret-key
      S3_BUCKET_NAME: ci-test-bucket
      OPENAI_API_KEY: sk-test-key-for-ci-only
      ALLOWED_ORIGINS: "http://localhost:5173,http://localhost:3000"
      REDIS_URL: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # Dev test deps (not in requirements.txt)
          pip install pytest-asyncio==0.25.0 httpx==0.28.1 pytest-cov==6.0.0
          # pydub is imported directly in routes.py — needed for any test that boots the app
          pip install pydub==0.25.1

      - name: Set up NLTK data
        working-directory: backend
        run: python docker/setup_nltk_data.py || true

      - name: Run config tests
        working-directory: backend
        run: pytest tests/config/ -v --tb=short

      - name: Run unit tests
        working-directory: backend
        run: |
          pytest tests/unit/ -v --tb=short \
            --ignore=tests/unit/test_import.py  # needs full app boot with all ML deps

      - name: Run cache tests
        working-directory: backend
        run: pytest tests/test_content_cache.py -v --tb=short

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8==7.1.1

      - name: Run flake8
        run: |
          flake8 backend/ \
            --exclude=backend/venv,backend/__pycache__,backend/models \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E203 \
            --count
